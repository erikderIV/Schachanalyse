<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schach</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="chessContainer">
        <!-- Eval Bar -->
        <div id="evalWrapper">
            <div id="evalScore">+0.0</div>
            <div id="evaluation">
                <div id="blackEvaluation"></div>
                <div id="whiteEvaluation"></div>
            </div>
        </div>
        <!-- Board + coordinates -->
        <div id="boardWrapper">
            <div id="coordRank">
                <span>8</span><span>7</span><span>6</span><span>5</span>
                <span>4</span><span>3</span><span>2</span><span>1</span>
            </div>
            <div id="boardColumn">
                <!-- Brett + Pfeil-Layer zusammen -->
                <div style="position: relative;">
                    <div id="chessBoard"></div>
                    <svg id="arrowLayer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
                </div>
                <div id="coordFile">
                    <span>a</span><span>b</span><span>c</span><span>d</span>
                    <span>e</span><span>f</span><span>g</span><span>h</span>
                </div>
            </div>
        </div>
        <!-- PGN Panel -->
        <div id="pgnPanel">
            <div id="pgnHeader">Notation</div>
            <div id="pgnContainer"></div>
        </div>
        <div id="moveBadge"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
